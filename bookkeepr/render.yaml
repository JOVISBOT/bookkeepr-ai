services:
  - type: web
    name: bookkeepr-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bookkeepr-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
      - key: APP_NAME
        value: BookKeepr AI
      - key: APP_URL
        value: https://bookkeepr-ai.onrender.com
      - key: SUPPORT_EMAIL
        value: support@bookkeepr.ai
      # Stripe — set in Render dashboard (DO NOT commit values)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # SendGrid — set in Render dashboard
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_FROM
        value: noreply@bookkeepr.ai
      # Anthropic AI — set in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: bookkeepr-db
    databaseName: bookkeepr
    user: bookkeepr
