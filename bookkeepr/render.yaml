services:
  # Flask Backend
  - type: web
    name: bookkeepr-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn run:app
    rootDir: bookkeepr/app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///bookkeepr.db
    
  # React Frontend  
  - type: static
    name: bookkeepr-frontend
    plan: free
    buildCommand: cd bookkeepr/app/frontend && npm install && npm run build
    publishDir: bookkeepr/app/frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://bookkeepr-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
