services:
  - type: web
    name: bookkeepr-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bookkeepr-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
      - key: APP_NAME
        value: BookKeepr AI

databases:
  - name: bookkeepr-db
    databaseName: bookkeepr
    user: bookkeepr
