{% extends "base.html" %}

{% block title %}Validation Error{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="text-center">
        <i data-lucide="file-warning" class="h-20 w-20 text-amber-500 mx-auto mb-6"></i>
        <h1 class="text-4xl font-bold text-gray-900 mb-4">422 - Validation Failed</h1>
        <p class="text-gray-600 mb-8">The data you submitted could not be processed.</p>
        <a href="{{ url_for('main.index') }}" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors">
            Go Home
        </a>
    </div>
</div>
{% endblock %}
