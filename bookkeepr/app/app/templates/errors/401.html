{% extends "base.html" %}

{% block title %}Unauthorized{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="text-center">
        <i data-lucide="lock" class="h-20 w-20 text-red-500 mx-auto mb-6"></i>
        <h1 class="text-4xl font-bold text-gray-900 mb-4">401 - Authentication Required</h1>
        <p class="text-gray-600 mb-8">Please log in to access this page.</p>
        <div class="space-x-4">
            <a href="{{ url_for('auth.login') }}" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors">
                Sign In
            </a>
            <a href="{{ url_for('main.index') }}" class="text-gray-600 hover:text-gray-900 font-medium">
                Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
