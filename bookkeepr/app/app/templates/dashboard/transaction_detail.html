{% extends "base.html" %}

{% block title %}Transaction Details{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen">
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center">
                <a href="{{ url_for('dashboard.transactions') }}" class="text-gray-500 hover:text-gray-700 mr-4">
                    <i data-lucide="arrow-left" class="h-5 w-5"></i>
                </a>
                <h1 class="text-2xl font-bold text-gray-900">Transaction Details</h1>
            </div>
        </div>
    </div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
            <p class="text-gray-500">Transaction ID: {{ transaction_id }}</p>
            <p class="text-gray-500 mt-2">Transaction details will appear here once connected to QuickBooks.</p>
        </div>
    </div>
</div>
{% endblock %}
