{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen">
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <h1 class="text-2xl font-bold text-gray-900">Settings</h1>
        </div>
    </div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-lg shadow-sm border border-gray-100">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">Profile Settings</h2>
                <p class="text-gray-500 text-sm">Manage your account information</p>
            </div>
            <div class="p-6 space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">First Name</label>
                        <input type="text" value="{{ current_user.first_name }}" class="mt-1 block w-full border border-gray-300 rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Last Name</label>
                        <input type="text" value="{{ current_user.last_name }}" class="mt-1 block w-full border border-gray-300 rounded-lg px-4 py-2">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" value="{{ current_user.email }}" class="mt-1 block w-full border border-gray-300 rounded-lg px-4 py-2" readonly>
                </div>
                <div class="pt-4">
                    <button class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-emerald-700 transition-colors">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
