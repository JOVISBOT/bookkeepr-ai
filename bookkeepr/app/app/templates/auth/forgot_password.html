{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <div class="flex justify-center">
                <i data-lucide="book-check" class="h-12 w-12 text-emerald-600"></i>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Forgot your password?
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Enter your email and we'll send you a reset link.
            </p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST" action="{{ url_for('auth.forgot_password') }}">
            <div>
                <label for="email" class="sr-only">Email address</label>
                <input id="email" name="email" type="email" required 
                    class="appearance-none relative block w-full px-3 py-2 border border-gray-300 rounded-md placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm"
                    placeholder="Enter your email">
            </div>
            
            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500">
                    Send Reset Link
                </button>
            </div>
        </form>
        
        <div class="text-center">
            <a href="{{ url_for('auth.login') }}" class="text-sm text-emerald-600 hover:text-emerald-500">
                Back to sign in
            </a>
        </div>
    </div>
</div>
{% endblock %}
