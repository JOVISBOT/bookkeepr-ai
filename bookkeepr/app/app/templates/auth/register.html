{% extends "base.html" %}

{% block title %}Get Started{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-blue-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <div class="flex justify-center">
                <i data-lucide="book-check" class="h-12 w-12 text-blue-600"></i>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-blue-900">
                Create your account
            </h2>
            <p class="mt-2 text-center text-sm text-blue-600">
                Start your 14-day free trial today
            </p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST" action="{{ url_for('auth.register') }}">
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="first_name" class="block text-sm font-medium text-blue-700">First name</label>
                        <input id="first_name" name="first_name" type="text" required 
                            class="mt-1 appearance-none relative block w-full px-3 py-2 border border-blue-300 rounded-md placeholder-blue-400 text-blue-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="last_name" class="block text-sm font-medium text-blue-700">Last name</label>
                        <input id="last_name" name="last_name" type="text" required 
                            class="mt-1 appearance-none relative block w-full px-3 py-2 border border-blue-300 rounded-md placeholder-blue-400 text-blue-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-blue-700">Email address</label>
                    <input id="email" name="email" type="email" required 
                        class="mt-1 appearance-none relative block w-full px-3 py-2 border border-blue-300 rounded-md placeholder-blue-400 text-blue-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="you@company.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-blue-700">Password</label>
                    <input id="password" name="password" type="password" required 
                        class="mt-1 appearance-none relative block w-full px-3 py-2 border border-blue-300 rounded-md placeholder-blue-400 text-blue-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                        placeholder="At least 8 characters">
                </div>
            </div>
            
            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Create Account
                </button>
            </div>
        </form>
        
        <p class="text-center text-xs text-blue-500 mt-4">
            By creating an account, you agree to our Terms of Service and Privacy Policy.
        </p>
    </div>
</div>
{% endblock %}
