{% extends "base.html" %}

{% block title %}Edit {{ company.qbo_company_name }} - BookKeepr AI{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-6">
            <a href="{{ url_for('clients.detail', client_id=company.id) }}" class="text-blue-600 hover:text-blue-800 text-sm">&larr; Back</a>
            <h1 class="text-2xl font-bold text-gray-900 mt-2">Edit Client</h1>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <form method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Client / Business Name *</label>
                    <input type="text" name="name" required maxlength="255"
                           value="{{ company.qbo_company_name or '' }}"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" name="email" maxlength="255"
                           value="{{ company.qbo_company_email or '' }}"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Phone</label>
                    <input type="tel" name="phone" maxlength="50"
                           value="{{ company.qbo_company_phone or '' }}"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Address</label>
                    <textarea name="address" rows="2"
                              class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500">{{ company.qbo_company_address or '' }}</textarea>
                </div>
                
                <div class="pt-4 flex justify-between">
                    <form method="POST" action="{{ url_for('clients.archive', client_id=company.id) }}" 
                          onsubmit="return confirm('Archive this client?');" style="display:inline">
                        <button type="submit"
                                class="px-4 py-2 border border-red-300 rounded-md text-sm font-medium text-red-700 bg-white hover:bg-red-50">
                            Archive Client
                        </button>
                    </form>
                    <button type="submit"
                            class="inline-flex justify-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
